name: KARIMO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate MANIFEST.json exists and is valid JSON
        run: |
          if [ ! -f ".karimo/MANIFEST.json" ]; then
            echo "❌ MANIFEST.json not found"
            exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('.karimo/MANIFEST.json'))"
          echo "✓ MANIFEST.json is valid"
