# KARIMO Sync (Tier 1)
#
# Status synchronization workflow. Triggers when KARIMO PRs are merged to update
# status.json and create final merge PRs when all tasks are complete.
#
# This workflow is always installed (required for KARIMO to function).

name: KARIMO Sync

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/**'

# Sync status when KARIMO PRs are merged
jobs:
  check-merge:
    runs-on: ubuntu-latest
    outputs:
      is-karimo-merge: ${{ steps.check.outputs.is-karimo-merge }}
      prd-slug: ${{ steps.check.outputs.prd-slug }}
      task-id: ${{ steps.check.outputs.task-id }}
    steps:
      - name: Check if KARIMO PR merged
        id: check
        run: |
          # Must be merged (not just closed)
          if [[ "${{ github.event.pull_request.merged }}" != "true" ]]; then
            echo "is-karimo-merge=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Must have karimo label
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'karimo') }}" != "true" ]]; then
            echo "is-karimo-merge=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract PRD slug and task ID from branch name
          # Expected format: feature/{prd-slug}/{task-id}
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" =~ ^feature/([^/]+)/([^/]+)$ ]]; then
            PRD_SLUG="${BASH_REMATCH[1]}"
            TASK_ID="${BASH_REMATCH[2]}"
            echo "is-karimo-merge=true" >> $GITHUB_OUTPUT
            echo "prd-slug=$PRD_SLUG" >> $GITHUB_OUTPUT
            echo "task-id=$TASK_ID" >> $GITHUB_OUTPUT
          else
            echo "is-karimo-merge=false" >> $GITHUB_OUTPUT
          fi

  sync-status:
    needs: check-merge
    if: needs.check-merge.outputs.is-karimo-merge == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Update status.json
        id: update
        env:
          PRD_SLUG: ${{ needs.check-merge.outputs.prd-slug }}
          TASK_ID: ${{ needs.check-merge.outputs.task-id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          STATUS_FILE=".karimo/prds/${PRD_SLUG}/status.json"

          if [ ! -f "$STATUS_FILE" ]; then
            echo "Status file not found: $STATUS_FILE"
            echo "all-done=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Update task status to done using Node.js (available on all GitHub runners)
          MERGED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          node -e "
          const fs = require('fs');
          const f = '$STATUS_FILE';
          const s = JSON.parse(fs.readFileSync(f, 'utf8'));

          // Update task status
          if (!s.tasks) s.tasks = {};
          s.tasks['$TASK_ID'] = {
            ...s.tasks['$TASK_ID'],
            status: 'done',
            merged_at: '$MERGED_AT',
            pr_number: $PR_NUMBER
          };

          // Count done tasks
          const tasks = Object.values(s.tasks);
          const total = tasks.length;
          const done = tasks.filter(t => t.status === 'done').length;

          // Check if all done
          if (total === done && total > 0) {
            s.status = 'complete';
            s.completed_at = '$MERGED_AT';
          }

          fs.writeFileSync(f, JSON.stringify(s, null, 2));

          // Output counts
          console.log('total=' + total);
          console.log('done=' + done);
          console.log('all-done=' + (total === done && total > 0));
          " >> $GITHUB_OUTPUT

      - name: Commit Status Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PRD_SLUG="${{ needs.check-merge.outputs.prd-slug }}"
          TASK_ID="${{ needs.check-merge.outputs.task-id }}"

          git add ".karimo/prds/${PRD_SLUG}/status.json"
          git commit -m "chore(karimo): mark task ${TASK_ID} as done

          PRD: ${PRD_SLUG}
          PR: #${{ github.event.pull_request.number }}

          [skip ci]" || echo "No changes to commit"

          git push

      - name: Create Final Merge PR
        if: steps.update.outputs.all-done == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prdSlug = '${{ needs.check-merge.outputs.prd-slug }}';
            const featureBranch = `feature/${prdSlug}`;
            const total = parseInt('${{ steps.update.outputs.total }}');

            // Check if PR already exists
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${featureBranch}`,
              base: 'main',
              state: 'open'
            });

            if (existingPRs.length > 0) {
              console.log(`Final merge PR already exists: #${existingPRs[0].number}`);
              return;
            }

            // Create final merge PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[KARIMO] Merge ${prdSlug}`,
              head: featureBranch,
              base: 'main',
              body: `## 🎉 KARIMO Feature Complete: ${prdSlug}

            All ${total} tasks have been completed and merged into the feature branch.

            This PR merges the complete feature into main.

            ### Summary

            - **PRD:** ${prdSlug}
            - **Tasks Completed:** ${total}
            - **Feature Branch:** \`${featureBranch}\`

            ### Review Checklist

            - [ ] All task PRs have been reviewed
            - [ ] Integration tests pass
            - [ ] Feature works as expected
            - [ ] Documentation is complete

            ---
            *Generated by [KARIMO](https://github.com/opensesh/KARIMO)*`
            });

            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['karimo', 'ready-for-review']
            });

            console.log(`Created final merge PR: #${pr.number}`);

      - name: Post Completion Comment
        if: steps.update.outputs.all-done == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prdSlug = '${{ needs.check-merge.outputs.prd-slug }}';
            const total = '${{ steps.update.outputs.total }}';

            const body = `## 🎉 All Tasks Complete!

            **PRD:** ${prdSlug}
            **Tasks:** ${total}/${total} done

            A final merge PR has been created to merge \`feature/${prdSlug}\` into \`main\`.

            ---
            *KARIMO Sync*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

  update-project:
    needs: [check-merge, sync-status]
    if: needs.check-merge.outputs.is-karimo-merge == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      repository-projects: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Update GitHub Project
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRD_SLUG: ${{ needs.check-merge.outputs.prd-slug }}
          TASK_ID: ${{ needs.check-merge.outputs.task-id }}
        run: |
          echo "Updating GitHub Project for task ${TASK_ID} in ${PRD_SLUG}"

          STATUS_FILE=".karimo/prds/${PRD_SLUG}/status.json"

          # Check if status file exists and has project info
          if [ ! -f "$STATUS_FILE" ]; then
            echo "Status file not found: $STATUS_FILE"
            echo "Skipping project update"
            exit 0
          fi

          # Extract project info from status.json using Node.js
          PROJECT_INFO=$(node -e "
          const fs = require('fs');
          const s = JSON.parse(fs.readFileSync('$STATUS_FILE', 'utf8'));
          if (s.project && s.project.number && s.project.owner) {
            console.log(s.project.number + '|' + s.project.owner + '|' + (s.project.owner_type || 'organization'));
          } else {
            console.log('');
          }
          ")

          if [ -z "$PROJECT_INFO" ]; then
            echo "No project info in status.json"
            echo "Skipping project update"
            exit 0
          fi

          PROJECT_NUMBER=$(echo "$PROJECT_INFO" | cut -d'|' -f1)
          PROJECT_OWNER=$(echo "$PROJECT_INFO" | cut -d'|' -f2)
          OWNER_TYPE=$(echo "$PROJECT_INFO" | cut -d'|' -f3)

          echo "Project: #${PROJECT_NUMBER} owned by ${PROJECT_OWNER} (${OWNER_TYPE})"

          # Set the owner flag based on type
          if [ "$OWNER_TYPE" = "personal" ]; then
            OWNER_FLAG="@me"
          else
            OWNER_FLAG="$PROJECT_OWNER"
          fi

          # Find project item by task ID pattern in title
          # Task issues are titled "[{task_id}] {task_title}"
          ITEM_ID=$(gh project item-list "$PROJECT_NUMBER" --owner "$OWNER_FLAG" --format json \
            --jq ".items[] | select(.content.title | contains(\"[$TASK_ID]\")) | .id" 2>/dev/null || echo "")

          if [ -z "$ITEM_ID" ]; then
            echo "Could not find project item for task [$TASK_ID]"
            echo "Skipping project update"
            exit 0
          fi

          echo "Found project item: $ITEM_ID"

          # Get project ID (needed for item-edit)
          PROJECT_ID=$(gh project view "$PROJECT_NUMBER" --owner "$OWNER_FLAG" --format json --jq '.id' 2>/dev/null || echo "")

          if [ -z "$PROJECT_ID" ]; then
            echo "Could not get project ID"
            echo "Skipping project update"
            exit 0
          fi

          # Get agent_status field ID
          STATUS_FIELD_ID=$(gh project field-list "$PROJECT_NUMBER" --owner "$OWNER_FLAG" --format json \
            --jq '.fields[] | select(.name == "agent_status") | .id' 2>/dev/null || echo "")

          if [ -z "$STATUS_FIELD_ID" ]; then
            echo "agent_status field not found in project"
            echo "Skipping status update"
            exit 0
          fi

          # Get the "done" option ID for agent_status field
          DONE_OPTION_ID=$(gh project field-list "$PROJECT_NUMBER" --owner "$OWNER_FLAG" --format json \
            --jq '.fields[] | select(.name == "agent_status") | .options[] | select(.name == "done") | .id' 2>/dev/null || echo "")

          if [ -z "$DONE_OPTION_ID" ]; then
            echo "done option not found in agent_status field"
            echo "Skipping status update"
            exit 0
          fi

          # Update the project item status to "done"
          gh project item-edit \
            --project-id "$PROJECT_ID" \
            --id "$ITEM_ID" \
            --field-id "$STATUS_FIELD_ID" \
            --single-select-option-id "$DONE_OPTION_ID" 2>/dev/null || {
              echo "Failed to update project item status"
              exit 0
            }

          echo "✅ Updated project item status to 'done'"
          echo "GitHub Project update complete"
